<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书展销平台</title>
    <link rel="stylesheet" href="css/lab2-班号-学号后3位-index.css">
</head>
<body>
    <header class="header">
        <div class="logo">
             <img src="img/logo.jpg" alt="网站Logo" width="120">
        </div>
        <nav class="nav">
            <ul>
                <li><a href=" ">首页</a ></li>
                <li><a href="#">图书分类</a ></li>
                <li><a href="#">热销推荐</a ></li>

            </ul>
        </nav>
    </header>

    <div class="container">

        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">文学小说</a ></li>
                <li><a href="#">科技计算机</a ></li>
                <li><a href="#">经管励志</a ></li>
                <li><a href="#">少儿读物</a ></li>
                <li><a href="#">教育考试</a ></li>
            </ul>

        <main class="main-content">
            <section class="book-show">
                <h3>图书展示区</h3>
                <div class="book-list">
                    <div class="book-item">
                          <img src="img/book1.jpg" alt="图书封面">
                        <p>《Java编程思想》</p >
                        </div>
                    <div class="book-item">
                         <img src="img/book2.jpg" alt="图书封面">
                        <p>《百年孤独》</p >
                    </div>
                </div>
            </section>

            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="hot-list">
                    <div class="hot-item">推荐图书1</div>
                    <div class="hot-item">推荐图书2</div>
                    <div class="hot-item">推荐图书3</div>
                </div>
            </section>

            <section class="new-books">
                <h3>新书上市</h3>
                <table border="1">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《AI时代的未来》</td>
                        <td>张三</td>
                        <td>¥49.9</td>
                    </tr>
                    <tr>
                        <td>《Web前端实战》</td>
                        <td>李四</td>
                        <td>¥59.9</td>
                    </tr>
                </table>
            </section>
        </main>

        <aside class="right-sidebar">
            <h3>促销活动</h3>
             <img src="img/ad.jpg" alt="促销广告" width="100">
            <p>满100减20，限时抢购！</p >
        </aside>
    </div>

</html>
